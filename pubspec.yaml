name: biashara_smart
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.2
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.1
  fl_chart: ^1.1.1
  intl: ^0.19.0
  provider: ^6.1.2
  pdf: ^3.11.3
  printing: ^5.14.2
  google_generative_ai: ^0.4.0
  path_provider: ^2.1.2
  connectivity_plus: ^6.0.0
  flutter_markdown: ^0.7.3+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/icon.png"